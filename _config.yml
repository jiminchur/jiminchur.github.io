title: jiminchur
email: your-email@example.com
description: >-
  여기에 새 사이트를 위한 멋진 설명을 작성하세요. _config.yml에서 이 줄을 편집할 수 있습니다. 이것은 Google 검색 결과 및 feed.xml 사이트 설명에 있는 문서 헤드 메타에 표시됩니다.
baseurl: "" # 사이트의 하위 경로, 예: /blog
url: "https://jiminchur.github.io" # 사이트의 기본 호스트 이름 & 프로토콜, 예: http://example.com
twitter_username: jekyllrb
github_username:  jiminchur

# 사이트의 SEO를 향상시키기 위해 추가
seo_tagline: jiminchur의 블로그
google_site_verification: "Google에서 제공하는 사이트 검증 코드"
bing_site_verification: "Bing에서 제공하는 사이트 검증 코드"

# 블로그 작성자 정보 - 사이트의 여러 부분에서 사용될 수 있음
author:
  name: 김지민
  bio: 여행, 코딩, 그리고 커피를 사랑하는 개발자
  avatar: "/assets/images/bio-photo.jpg"

# 소셜 미디어 링크 추가
social_links:
  twitter: https://twitter.com/jekyllrb
  github: https://github.com/jiminchur
  linkedin: https://www.linkedin.com/in/jiminchur/
  instagram: https://www.instagram.com/jiminchur

# 댓글 시스템 - disqus (선택적)
comments:
  provider: "disqus"
  disqus:
    shortname: "your-disqus-shortname"

# Google Analytics (선택적)
google_analytics: "UA-XXXXX-Y"

# 사이트 맵 생성
plugins:
  - jekyll-feed
  - jekyll-sitemap

# 포함 및 제외 파일/디렉토리 설정
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
include:
  - .htaccess

# 빌드 시 압축을 사용하여 사이트 속도 향상
# 이 기능을 사용하려면 jekyll-compress 이미지 플러그인이 필요할 수 있음
compress_html: true
