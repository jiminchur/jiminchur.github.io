# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
remote_theme: "mmistakes/jekyll-theme-basically-basic"

lang: en-US
title: DataEngineer
email: 
description: "Hello My Blog"
baseurl: "" # the optional subpath of your site, e.g. "/blog"
url: "https://jiminchur.github.io" # the base hostname & protocol for your site e.g. "https://mmistakes.github.io"
author:
  name: 지민철
  twitter:
  picture: /assets/images/johndoe.png
twitter_username:
github_username: 
logo: /assets/icons/basically-basic-logo-light.svg # path of site logo, e.g. "/assets/images/logo.png"
search: true # true, false (default)
search_full_content: true # true, false (default)
search_provider: algolia # lunr (default), algolia
algolia:
  application_id: MDO0KHVCJF # YOUR_APPLICATION_ID
  index_name: jiminchur # YOUR_INDEX_NAME
  search_only_api_key: f035ba4d00d48d75422c0f9d7970682d # YOUR_SEARCH_ONLY_API_KEY
  powered_by: # true (default), false
comments:
  provider: "disqus"
  disqus:
    shortname: "jiminchur"


# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
incremental: false


# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..3
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false


# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed # https://sass-lang.com/documentation/file.SASS_REFERENCE.html#output_style


# Pagination - https://jekyllrb.com/docs/pagination/
paginate: 10
paginate_path: /page:num/

# Exclude from processing.
exclude:
  - .asset-cache
  - .bundle
  - .codeclimate.yml
  - .editorconfig
  - .gitattributes
  - .jekyll-assets-cache
  - .sass-cache
  - .scss-lint.yml
  - CHANGELOG
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - node_modules
  - Rakefile
  - README
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - /docs # ignore Basically Basic sample site
  - /example # ignore Basically Basic dev site

collections:
  recipes:
    output: true
    permalink: /:collection/:path/
# Front Matter Defaults
defaults:
  # _posts
  - scope:
      path: "_posts"
      type: posts
    values:
      layout: post
      read_time: true
      comments: true
  - scope:
      path: "_recipes"
      type: recipes
    values:
      layout: post
      read_time: true

# Outputting
permalink: /:categories/:title/
timezone: Aisa/Seoul # http://en.wikipedia.org/wiki/List_of_tz_database_time_zones

# Plugin: Table of Contents (jekyll-toc)
toc:
  min_level: 2
  max_level: 2
  list_class: "toc__menu"
  item_class: "toc__entry"
  item_prefix: "toc__"

plugins:
  - jekyll-toc
